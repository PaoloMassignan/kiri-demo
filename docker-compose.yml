services:

  kiri:
    image: ghcr.io/paolomassignan/kiri:latest
    restart: always
    ports:
      - "127.0.0.1:8765:8765"
    volumes:
      - ${WORKSPACE_HOST:-.}:/workspace:ro
      - ./.kiri:/workspace/.kiri
    environment:
      - WORKSPACE=/workspace
      - KIRI_CONFIG=/workspace/.kiri/config.yaml
      - OLLAMA_BASE_URL=http://ollama:11434
      # In local mode the start script sets KIRI_UPSTREAM_URL=http://litellm:4000
      # so that Kiri forwards to LiteLLM instead of the real Anthropic API.
      - ANTHROPIC_BASE_URL=${KIRI_UPSTREAM_URL:-https://api.anthropic.com}
    secrets:
      - anthropic_key
    depends_on:
      ollama-pull:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8765/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 90s

  ollama:
    image: ollama/ollama:latest
    restart: always
    volumes:
      - ollama_models:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  ollama-pull:
    image: curlimages/curl:latest
    restart: "no"
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        curl -sf http://ollama:11434/api/pull \
          -d '{"model":"qwen2.5:3b"}' \
          -H 'Content-Type: application/json'

  # ── Local mode: LiteLLM bridges Kiri → Ollama (no cloud account needed) ──────
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    profiles: [local]
    restart: always
    ports:
      - "127.0.0.1:4000:4000"
    volumes:
      - ./litellm_config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000", "--host", "0.0.0.0"]
    depends_on:
      ollama:
        condition: service_healthy

secrets:
  anthropic_key:
    file: .kiri/upstream.key   # created automatically by start scripts in OAuth mode

volumes:
  ollama_models:
